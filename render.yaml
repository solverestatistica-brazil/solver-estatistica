services:
  - type: web
    name: solver-estatistica-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: CORS_ORIGINS
        value: https://www.solver-estatistica.com.br,https://solver-estatistica.com.br,https://solverestatistica-brazil.github.io
      - key: MAX_REQUEST_BYTES
        value: 5242880
      - key: MAX_DATA_ROWS
        value: 10000
      - key: MAX_CONCURRENT_ANALYSES
        value: 2
      - key: RATE_LIMIT_PER_MINUTE
        value: 60
      # O balanceador do Render fornece o IP do cliente em X-Forwarded-For.
      - key: TRUST_PROXY_HEADERS
        value: true
