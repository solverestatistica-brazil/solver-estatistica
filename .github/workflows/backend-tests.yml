name: Backend tests

on:
  push:
    branches: ["main"]
    paths: ["backend/**"]
  pull_request:
    paths: ["backend/**"]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run test suite
        run: pytest -v
