name: Backend tests

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "examples/**"
      - "frontend/assets/data/**"
      - "frontend/assets/js/**"
      - "frontend/test_*.cjs"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - "examples/**"
      - "frontend/assets/data/**"
      - "frontend/assets/js/**"
      - "frontend/test_*.cjs"
      - ".github/workflows/backend-tests.yml"
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run test suite
        run: pytest -v --cov=main --cov=statistics_engine --cov=assumptions --cov=transformations --cov-report=term-missing --cov-report=xml --cov-fail-under=75

      - name: Validate frontend JavaScript syntax
        working-directory: frontend
        run: |
          node --check assets/js/app.js
          node --check assets/js/csv-parser.js
          node --check assets/js/analytics.js
          node --check assets/js/manual-data.js
          node test_csv_parser.cjs
          node test_analytics_consent.cjs
          node test_processing_ui.cjs
          node test_mobile_ui.cjs
          node test_manual_data.cjs
          node test_guided_data_flow.cjs
