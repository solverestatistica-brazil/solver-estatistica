name: Backend and frontend quality

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "examples/**"
      - "frontend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - "examples/**"
      - "frontend/**"
      - ".github/workflows/backend-tests.yml"
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run test suite
        run: pytest -v --cov=main --cov=statistics_engine --cov=assumptions --cov=transformations --cov-report=term-missing --cov-report=xml --cov-fail-under=75

      - name: Validate frontend JavaScript syntax and contracts
        working-directory: frontend
        run: |
          node --check assets/js/app.js
          node --check assets/js/csv-parser.js
          node --check assets/js/analytics.js
          node --check assets/js/manual-data.js
          node test_csv_parser.cjs
          node test_analytics_consent.cjs
          node test_processing_ui.cjs
          node test_mobile_ui.cjs
          node test_manual_data.cjs
          node test_guided_data_flow.cjs
          node test_data_loss_guard.cjs
          node test_prevalidation.cjs
          node test_a11y.cjs
          node test_column_mapping.cjs
          node test_contextual_examples.cjs
          node test_safe_interpretation.cjs
          node test_author_name.cjs
          node test_api_health_timeout.cjs

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: pytest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install test dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: pnpm test:e2e

      - name: Upload E2E diagnostics on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          path: |
            frontend/test-results
            frontend/playwright-report
          if-no-files-found: ignore
          retention-days: 7
