name: Dependency security audit

on:
  pull_request:
  schedule:
    - cron: "23 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install audit tool
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit production dependencies
        working-directory: backend
        run: |
          # FastAPI 0.139.x suporta Starlette <1.0. Os IDs abaixo exigem Starlette 1.x;
          # permanecem registrados em docs/SECURITY_BASELINE.md e qualquer alerta novo falha o job.
          ignored=(--ignore-vuln PYSEC-2026-161 --ignore-vuln PYSEC-2026-248 --ignore-vuln PYSEC-2026-249 --ignore-vuln PYSEC-2026-2280 --ignore-vuln PYSEC-2026-2281)
          pip-audit -r requirements.txt "${ignored[@]}"
          pip-audit -r requirements-dev.txt "${ignored[@]}" --format json --output pip-audit.json

      - name: Preserve audit result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-result
          path: backend/pip-audit.json
          if-no-files-found: warn
          retention-days: 30