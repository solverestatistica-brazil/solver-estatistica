name: Dependency security audit

on:
  pull_request:
    paths:
      - "backend/requirements*.txt"
      - "frontend/package.json"
      - "frontend/pnpm-lock.yaml"
      - ".github/workflows/security-audit.yml"
  schedule:
    - cron: "23 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install audit tool
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit production dependencies
        working-directory: backend
        run: |
          pip-audit -r requirements.txt
          pip-audit -r requirements-dev.txt --format json --output pip-audit.json

      - name: Preserve audit result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-result
          path: backend/pip-audit.json
          if-no-files-found: warn
          retention-days: 30